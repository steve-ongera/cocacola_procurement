<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/coca-cola.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coca-Cola Kenya | Procurement System</title>

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap"
      rel="stylesheet"
    />

    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --red:        #E30613;
        --red-dark:   #B8000E;
        --red-light:  #FF4D5A;
        --red-pale:   #FFF0F0;
        --black:      #0A0A0A;
        --gray-900:   #111827;
        --gray-800:   #1F2937;
        --gray-600:   #4B5563;
        --gray-400:   #9CA3AF;
        --gray-200:   #E5E7EB;
        --gray-100:   #F3F4F6;
        --gray-50:    #F9FAFB;
        --white:      #FFFFFF;
        --sidebar-w:  260px;
        --header-h:   64px;
        --radius:     10px;
        --shadow-sm:  0 1px 3px rgba(0,0,0,.08);
        --shadow:     0 4px 16px rgba(0,0,0,.10);
        --shadow-lg:  0 8px 32px rgba(0,0,0,.14);
        --font-body:  'Plus Jakarta Sans', sans-serif;
        --font-head:  'DM Serif Display', serif;
        --transition: 200ms ease;
      }

      html, body, #root {
        height: 100%;
        font-family: var(--font-body);
        background: var(--gray-50);
        color: var(--gray-900);
        -webkit-font-smoothing: antialiased;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--gray-200); border-radius: 99px; }

      /* Utility */
      .text-red { color: var(--red); }
      .bg-red   { background: var(--red); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
